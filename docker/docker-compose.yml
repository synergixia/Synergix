version: '3.8'

services:
  # Juez: Evalúa calidad técnica (1.5B para mayor criterio y análisis)
  synergix-juez:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: synergix-juez
    command: "-m /models/qwen2.5-1.5b-instruct-q4_k_m.gguf --host 0.0.0.0 --port 8080 -c 1024"
    ports:
      - "8080:8080"
    volumes:
      - ../aisynergix/ai/models:/models:ro
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    restart: unless-stopped

  # Pensador: Respuesta rápida y precisa (0.5B optimizado para velocidad y RAG)
  synergix-pensador:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: synergix-pensador
    command: "-m /models/qwen2.5-0.5b-instruct-q4_k_m.gguf --host 0.0.0.0 --port 8081 -c 2048"
    ports:
      - "8081:8081"
    volumes:
      - ../aisynergix/ai/models:/models:ro
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
    restart: unless-stopped

networks:
  synergix-net:
    driver: bridge
