services:
  # Pensador (1.5B model) - Main AI reasoning
  pensador:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: synergix-ia-pensador
    command: >
      llama-server
      --host 0.0.0.0
      --port 8081
      --model /aisynergix/ai/models/qwen2.5-1.5b.gguf
      --ctx-size 4096
      --threads -1
      --n-gpu-layers 0
      --parallel 4
      --cont-batching
    ports:
      - "8081:8081"
    networks:
      - synergix-internal
    volumes:
      - /root/Synergix/aisynergix/ai/models:/aisynergix/ai/models
    environment:
      - LLAMA_KV_CACHE_TYPE=f16
      - LLAMA_LOG_LEVEL=error
    deploy:
      resources:
        limits:
          memory: 3.5G
        reservations:
          memory: 3G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # Juez (0.5B model) - Fast JSON evaluation
  juez:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: synergix-ia-juez
    command: >
      llama-server
      --host 0.0.0.0
      --port 8080
      --model /aisynergix/ai/models/qwen2.5-0.5b.gguf
      --ctx-size 2048
      --threads -1
      --n-gpu-layers 0
      --parallel 2
      --cont-batching
    ports:
      - "8080:8080"
    networks:
      - synergix-internal
    volumes:
      - /root/Synergix/aisynergix/ai/models:/aisynergix/ai/models
    environment:
      - LLAMA_KV_CACHE_TYPE=f16
      - LLAMA_LOG_LEVEL=error
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Bot principal - Python application
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: synergix-bot
    command: python main.py
    ports:
      - "3000:3000"  # Optional: for health/metrics endpoint
    networks:
      - synergix-internal
    volumes:
      - /root/Synergix/aisynergix/ai/models:/aisynergix/ai/models
      - data-volume:/aisynergix/data
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - GREENFIELD_PRIVATE_KEY=${GREENFIELD_PRIVATE_KEY}
      - GREENFIELD_RPC_URL=${GREENFIELD_RPC_URL}
      - BUCKET_NAME=synergixai
      - NODE_ENV=production
      - PENSADOR_URL=http://synergix-ia-pensador:8081
      - JUEZ_URL=http://synergix-ia-juez:8080
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped
    depends_on:
      pensador:
        condition: service_healthy
      juez:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  synergix-internal:
    driver: bridge
    internal: true

volumes:
  data-volume:
    driver: local
    driver_opts:
      type: none
      device: /root/Synergix/aisynergix/data
      o: bind

  ai-models-volume:
    driver: local
    driver_opts:
      type: none
      device: /root/Synergix/aisynergix/ai/models
      o: bind
