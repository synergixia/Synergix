services:
  # ── MOTOR DE IA: PENSADOR (1.5B) ──
  ia-pensador:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: synergix-ia-pensador
    volumes:
      - ../qwen2.5-1.5b-instruct-q4_k_m.gguf:/models/model.gguf
    ports:
      - "8080:8080"
    command: ["-m", "/models/model.gguf", "--host", "0.0.0.0", "--port", "8080", "--threads", "2", "--ctx-size", "2048"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1.5G

  # ── MOTOR DE IA: JUEZ (0.5B) ──
  ia-juez:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: synergix-ia-juez
    volumes:
      - ../qwen2.5-0.5b-instruct-q8_0.gguf:/models/model.gguf
    ports:
      - "8081:8081"
    command: ["-m", "/models/model.gguf", "--host", "0.0.0.0", "--port", "8081", "--threads", "2", "--ctx-size", "512"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 600M

  # ── SYNERGIX BOT ──
  synergix-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: synergix-bot
    depends_on:
      - ia-pensador
      - ia-juez
    env_file: ../.env
    environment:
      - OLLAMA_BASE=http://ia-pensador:8080
      - URL_JUEZ=http://ia-juez:8081
    volumes:
      - ../aisynergix/data:/app/aisynergix/data
      - ../aisynergix/logs:/app/aisynergix/logs
    command: ["python3", "aisynergix/bot/bot.py"]
    restart: unless-stopped

  # ── SYNERGIX BACKEND ──
  synergix-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: synergix-backend
    depends_on:
      - ia-pensador
    env_file: ../.env
    environment:
      - OLLAMA_BASE=http://ia-pensador:8080
    ports:
      - "8000:8000"
    volumes:
      - ../aisynergix/data:/app/aisynergix/data
    command: ["uvicorn", "aisynergix.backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
