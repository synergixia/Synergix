version: '3.8'

services:
  synergix-ia-juez:
    image: ghcr.io/ggerganov/llama.cpp:light
    volumes:
      - ../models:/models
    entrypoint: ["/llama-server"]
    command: "-m /models/qwen2.5-0.5b.gguf -c 2048 --port 8080 --host 0.0.0.0"
    deploy:
      resources:
        limits:
          memory: 1.5G
    networks:
      - synergix-net

  synergix-ia-pensador:
    image: ghcr.io/ggerganov/llama.cpp:light
    volumes:
      - ../models:/models
    entrypoint: ["/llama-server"]
    command: "-m /models/qwen2.5-1.5b.gguf -c 4096 --port 8081 --host 0.0.0.0"
    deploy:
      resources:
        limits:
          memory: 3.5G
    networks:
      - synergix-net

  synergix-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: .env
    depends_on:
      - synergix-ia-juez
      - synergix-ia-pensador
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - synergix-net

networks:
  synergix-net:
    driver: bridge
