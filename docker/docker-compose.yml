version: '3.8'

services:
  synergix-juez:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: synergix-juez
    command: "-m /models/qwen2.5-0.5b-instruct-q4_k_m.gguf --host 0.0.0.0 --port 8080 -c 512"
    ports:
      - "8080:8080"
    volumes:
      - ../aisynergix/ai/models:/models:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G
    networks:
      - synergix-net
    restart: unless-stopped

  synergix-pensador:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: synergix-pensador
    command: "-m /models/qwen2.5-1.5b-instruct-q4_k_m.gguf --host 0.0.0.0 --port 8081 -c 2048 -t 2"
    ports:
      - "8081:8081"
    volumes:
      - ../aisynergix/ai/models:/models:ro
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3.5G
    networks:
      - synergix-net
    restart: unless-stopped

networks:
  synergix-net:
    driver: bridge
