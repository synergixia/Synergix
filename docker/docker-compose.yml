services:
  pensador:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: synergix-ia-pensador
    command: >
      llama-server
      --host 0.0.0.0
      --port 8081
      --model /aisynergix/ai/models/qwen2.5-1.5b.gguf
      --ctx-size 4096
      --threads 4
      --n-gpu-layers 0
      --parallel 4
      --cont-batching
    ports:
      - "8081:8081"
    networks:
      - synergix-internal
    volumes:
      - /root/Synergix/aisynergix/ai/models:/aisynergix/ai/models
    environment:
      - LLAMA_KV_CACHE_TYPE=f16
    deploy:
      resources:
        limits:
          memory: 3.5G
        reservations:
          memory: 3G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  juez:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: synergix-ia-juez
    command: >
      llama-server
      --host 0.0.0.0
      --port 8080
      --model /aisynergix/ai/models/qwen2.5-0.5b.gguf
      --ctx-size 2048
      --threads 2
      --n-gpu-layers 0
      --parallel 2
      --cont-batching
    ports:
      - "8080:8080"
    networks:
      - synergix-internal
    volumes:
      - /root/Synergix/aisynergix/ai/models:/aisynergix/ai/models
    environment:
      - LLAMA_KV_CACHE_TYPE=f16
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    container_name: synergix-bot
    command: python main.py
    networks:
      - synergix-internal
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - /root/Synergix/aisynergix/ai/models:/aisynergix/ai/models
      - data-volume:/aisynergix/data
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - GREENFIELD_PRIVATE_KEY=${GREENFIELD_PRIVATE_KEY}
      - GREENFIELD_RPC_URL=${GREENFIELD_RPC_URL}
      - BUCKET_NAME=synergixai
      - PENSADOR_URL=http://synergix-ia-pensador:8081
      - JUEZ_URL=http://synergix-ia-juez:8080
      # Restricciones duras para prevenir los escapes de memoria de PyTorch en CPU
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
    deploy:
      resources:
        limits:
          # ¡Aumentado de 1G a 2.5G para que PyTorch no explote salvando el tensor E5-small!
          memory: 2.5G
          cpus: '1.0'
        reservations:
          memory: 1G
    restart: unless-stopped
    depends_on:
      pensador:
        condition: service_healthy
      juez:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      # extendemos el warmup para descargas
      start_period: 180s

networks:
  synergix-internal:
    driver: bridge

volumes:
  data-volume:
    driver: local
    driver_opts:
      type: none
      device: /root/Synergix/aisynergix/data
      o: bind
