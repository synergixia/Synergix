version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# Synergix — docker-compose.yml
# Despliegue en 1 clic en Hetzner ARM64
#
# Servicios:
#   ollama  — Motor IA local (Qwen 0.5B Juez + Qwen 1.5B Pensador)
#   bot     — Bot Telegram con todos los loops background
#
# Uso:
#   docker compose up -d            # Arrancar todo
#   docker compose logs -f bot      # Ver logs del bot
#   docker compose restart bot      # Reiniciar solo el bot
#   docker compose exec bot bash    # Shell interactivo
#   docker compose down             # Detener todo
#
# Copiar .env.example → .env antes de arrancar
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Ollama — El Juez (0.5B) + El Pensador (1.5B) ──────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: synergix_ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama        # Modelos persistentes
    ports:
      - "127.0.0.1:11434:11434"            # Solo accesible localmente
    environment:
      - OLLAMA_KEEP_ALIVE=24h              # Mantener modelos en RAM
      - OLLAMA_NUM_PARALLEL=1              # 1 request a la vez (ARM64, 8GB)
      - OLLAMA_MAX_LOADED_MODELS=2         # Juez + Pensador simultáneos
    deploy:
      resources:
        limits:
          memory: 5G                       # 5GB máx para los dos modelos
          cpus: "3"                        # 3 de 4 núcleos para IA
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Synergix Bot ──────────────────────────────────────────────────────────
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: synergix_bot
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      # Override para que el bot use Ollama del contenedor
      - OLLAMA_BASE=http://ollama:11434
      - LLAMA_BASE=http://ollama:11434    # Sin llama-server separado en Docker
      - PYTHONPATH=/app
      - NUM_THREADS=1                    # 1 hilo para el bot (Ollama usa los demás)
    volumes:
      - synergix_data:/app/aisynergix/data        # DB local persistente
      - synergix_logs:/app/aisynergix/logs        # Logs persistentes
      - synergix_brain:/app/aisynergix/SYNERGIXAI # Cerebro local
    deploy:
      resources:
        limits:
          memory: 1G                     # 1GB para el bot Python
          cpus: "1"                      # 1 núcleo para el bot
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import httpx, asyncio; asyncio.run(httpx.AsyncClient().get('http://localhost:8080/health', timeout=3))"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s
    command: >
      sh -c "
        echo '🔥 Descargando modelos Qwen si no existen...' &&
        curl -s http://ollama:11434/api/pull -d '{\"name\":\"qwen2.5:0.5b\"}' --max-time 300 || true &&
        curl -s http://ollama:11434/api/pull -d '{\"name\":\"qwen2.5:1.5b\"}' --max-time 600 || true &&
        echo '🚀 Iniciando Synergix Bot...' &&
        python3 aisynergix/bot/bot.py
      "

volumes:
  ollama_models:
    name: synergix_ollama_models
  synergix_data:
    name: synergix_data
  synergix_logs:
    name: synergix_logs
  synergix_brain:
    name: synergix_brain
