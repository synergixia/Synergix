version: '3.8'

services:
  synergix-juez:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: synergix-juez
    # Se usa Qwen 0.5B para latencia ultra-baja en la validación técnica
    command: "-m /models/qwen1_5-0_5b-chat-q4_k_m.gguf --host 0.0.0.0 --port 8080 -c 512"
    ports:
      - "8080:8080"
    volumes:
      - ../aisynergix/ai/models:/models:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G
    networks:
      - synergix-net
    restart: unless-stopped

  synergix-pensador:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: synergix-pensador
    # Se usa Qwen 1.5B con mayor contexto para el RAG y generación de respuestas
    command: "-m /models/qwen1_5-1_5b-chat-q4_k_m.gguf --host 0.0.0.0 --port 8081 -c 2048"
    ports:
      - "8081:8081"
    volumes:
      - ../aisynergix/ai/models:/models:ro
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3.5G
    networks:
      - synergix-net
    restart: unless-stopped

networks:
  synergix-net:
    driver: bridge
