version: '3.8'

services:
  synergix-ia-juez:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: synergix-ia-juez
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ../aisynergix/ai/models:/models
    command: llama-server -m /models/qwen2.5-0.5b.gguf --host 0.0.0.0 --port 8080 -c 1024 -np 256
    deploy:
      resources:
        limits:
          memory: 1.5G
    networks:
      - synergix-net

  synergix-ia-pensador:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: synergix-ia-pensador
    restart: always
    ports:
      - "8081:8081"
    volumes:
      - ../aisynergix/ai/models:/models
    command: llama-server -m /models/qwen2.5-1.5b.gguf --host 0.0.0.0 --port 8081 -c 4096 -np 1024
    deploy:
      resources:
        limits:
          memory: 3.5G
    networks:
      - synergix-net

  synergix-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: synergix-bot
    restart: always
    env_file: ../.env
    depends_on:
      - synergix-ia-juez
      - synergix-ia-pensador
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - synergix-net

networks:
  synergix-net:
    driver: bridge
