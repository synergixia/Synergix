version: '3.8'

services:
  synergix-ia-juez:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: synergix-ia-juez
    # Juez Rápido (Qwen 0.5B - Validador de código)
    command: "-m /models/qwen2.5-0.5b-instruct-q4_k_m.gguf --host 0.0.0.0 --port 8080 -c 512"
    volumes:
      - ./aisynergix/ai/models:/models:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G
    networks:
      - synergix-net
    restart: unless-stopped

  synergix-ia-pensador:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: synergix-ia-pensador
    # Pensador Principal (Qwen 1.5B - Motor RAG y Respuestas)
    command: "-m /models/qwen2.5-1.5b-instruct-q4_k_m.gguf --host 0.0.0.0 --port 8081 -c 2048 -t 2"
    volumes:
      - ./aisynergix/ai/models:/models:ro
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3.5G
    networks:
      - synergix-net
    restart: unless-stopped

  synergix-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: synergix-bot
    env_file:
      - .env
    depends_on:
      - synergix-ia-juez
      - synergix-ia-pensador
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.0G
    networks:
      - synergix-net
    restart: always

networks:
  synergix-net:
    driver: bridge
